<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Hello World</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #f38020; } /* Cloudflare Orange */
        p { color: #666; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hello World!</h1>
        <p>這是您的第一個 OpenClaw / Cloudflare Pages 測試網頁。</p>
        <p>狀態：<strong>已上線 ✅</strong></p>
    </div>
</body>
</html>
